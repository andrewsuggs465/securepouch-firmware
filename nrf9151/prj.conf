# SecurePouch nRF9151 RCP firmware
# Build: west build -b nrf9151dk/nrf9151/ns
#
# Role: radio co-processor. LTE-M attach + GNSS fix + FMD HTTP client, bridged
# to the nRF52840 (the application brain) over uart2. No application logic here.

# --- Modem + TF-M (mandatory for any modem use on the /ns board) ---
CONFIG_NRF_MODEM_LIB=y
CONFIG_TFM_PROFILE_TYPE_MINIMAL=y
CONFIG_FPU=y

# --- LTE link control: LTE-M + GNSS coexistence, PSM for a sleepy tracker ---
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_NETWORK_MODE_LTE_M_GPS=y
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_PSM_REQ=y

# --- Networking via modem-offloaded sockets (no native IP stack) ---
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE=n
CONFIG_DNS_RESOLVER=y

# --- HTTP client (plaintext for the prototype; see overlay-tls.conf to harden) ---
CONFIG_HTTP_CLIENT=y
CONFIG_HEAP_MEM_POOL_SIZE=16384

# --- High-level Location library: GNSS-only (standalone, no cloud needed) ---
# Cellular/Wi-Fi fallback methods need an nRF Cloud location service (account +
# JWT provisioning) — out of scope for the prototype. GNSS works standalone.
# TODO(P3): add CONFIG_LOCATION_METHOD_CELLULAR + CONFIG_NRF_CLOUD_REST and
# A-GNSS for fast cold start once a cloud account is provisioned.
CONFIG_LOCATION=y
CONFIG_LOCATION_METHOD_GNSS=y
# Cellular/Wi-Fi methods default to y and drag in the nRF Cloud location
# service; turn them off for a standalone GNSS-only prototype.
CONFIG_LOCATION_METHOD_CELLULAR=n
CONFIG_LOCATION_METHOD_WIFI=n
CONFIG_MODEM_INFO=y
CONFIG_DATE_TIME=y

# --- UART bridge to the nRF52840 (uart2, pins set in board overlay) ---
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# --- Misc: logging + JSON, generous main stack for sockets ---
CONFIG_LOG=y
CONFIG_JSON_LIBRARY=y
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
