[platformio]
src_dir = .

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200
upload_protocol = sam-ba
; Arduino's bossac fork (1.9.1-arduino5) is required for the R4 WiFi bootloader.
; PlatformIO bundles an older build that doesn't speak the R4 SAM-BA dialect.
; Flash manually: ~/.arduino15/packages/arduino/tools/bossac/1.9.1-arduino5/bossac
;   -d --port=ttyACM0 -U -e -w .pio/build/uno_r4_wifi/firmware.bin -R
; (Double-tap reset first to enter bootloader — onboard LED pulses white)
lib_deps =
    arduino-libraries/ArduinoBLE @ ^2.1.0
