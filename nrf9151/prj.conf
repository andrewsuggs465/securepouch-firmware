# SecurePouch nRF9151 RCP firmware
# Build: west build -b nrf9151dk/nrf9151/ns
#
# Role: radio co-processor. LTE-M attach + GNSS fix + FMD HTTPS client, bridged
# to the nRF52840 (the application brain) over uart2. No application logic here.

# --- Modem + TF-M (mandatory for any modem use on the /ns board) ---
CONFIG_NRF_MODEM_LIB=y
CONFIG_TFM_PROFILE_TYPE_MINIMAL=y
CONFIG_FPU=y

# --- LTE link control: LTE-M + GNSS coexistence ---
# PSM disabled for the demo — modem stays always-on for reliable uploads.
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_NETWORK_MODE_LTE_M_GPS=y
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_PSM_REQ=n

# --- Networking via modem-offloaded sockets (no native IP stack) ---
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE=n
CONFIG_DNS_RESOLVER=y

# --- HTTP(S) client ---
CONFIG_HTTP_CLIENT=y
# Modem TLS (offloaded) — used for HTTPS to the FMD server and OpenCellID.
# The modem handles TLS in firmware; no mbedTLS in the app core needed.
CONFIG_MODEM_KEY_MGMT=y
CONFIG_HEAP_MEM_POOL_SIZE=32768

# --- High-level Location library: GNSS primary + cellular fallback ---
# Cellular fallback uses LOCATION_SERVICE_EXTERNAL so we call OpenCellID
# directly (no nRF Cloud account needed). When GNSS fails indoors the library
# fires LOCATION_EVT_CLOUD_LOCATION_EXT_REQUEST with the serving-cell data;
# our handler queries OpenCellID and feeds the result back.
CONFIG_LOCATION=y
CONFIG_LOCATION_METHOD_GNSS=y
CONFIG_LOCATION_METHOD_CELLULAR=y
CONFIG_LOCATION_SERVICE_EXTERNAL=y
CONFIG_LOCATION_METHOD_WIFI=n
# AT monitor heap must be >= 1024 for cellular scan_cellular.c (BUILD_ASSERT)
CONFIG_AT_MONITOR_HEAP_SIZE=1024
CONFIG_MODEM_INFO=y
CONFIG_DATE_TIME=y

# --- UART bridge to the nRF52840 (uart2, pins set in board overlay) ---
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# --- Misc: logging + JSON, generous main stack for sockets + TLS ---
CONFIG_LOG=y
CONFIG_JSON_LIBRARY=y
CONFIG_MAIN_STACK_SIZE=12288
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
